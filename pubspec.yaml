name: ithaki_ui
description: Ithaki UI - High-Tech Talent Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  pin_code_fields: ^9.1.0
  shared_preferences: ^2.5.5
  file_picker: ^10.3.10
  http: ^1.6.0
  ithaki_design_system:
    git:
      url: https://github.com/danielhernandomartinez/ithaki_design_system
      ref: v0.10.16


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
