name: ithaki_ui
description: Ithaki UI - High-Tech Talent Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  pin_code_fields: ^8.0.1
  intl_phone_field: ^3.2.0
  country_picker: ^2.0.21
  ithaki_design_system:
    git:
      url: https://github.com/danielhernandomartinez/ithaki_design_system.git
      ref: v0.9.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
